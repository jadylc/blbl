name: Android Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 0.1.1)"
        required: false
        default: ""
      changelog:
        description: "Release notes/changelog (optional; supports multiline)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION_NAME_BASE="$(grep '^VERSION_NAME_BASE=' gradle.properties | head -n1 | cut -d= -f2- | tr -d '\r' | xargs || true)"
          VERSION_NAME_BASE="${VERSION_NAME_BASE:-0.1.0}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_VERSION="${{ inputs.version_name }}"
            if [ -n "${INPUT_VERSION}" ]; then
              VERSION_NAME="${INPUT_VERSION#v}"
            else
              VERSION_NAME="${VERSION_NAME_BASE}.${GITHUB_RUN_NUMBER}"
            fi
            CLEAN_VERSION="${VERSION_NAME}"
            RELEASE_TAG="v${CLEAN_VERSION}"
            RELEASE_NAME="${RELEASE_TAG}"
            RELEASE_MODE="versioned"
            APK_FILE_NAME="blbl-${CLEAN_VERSION}-release.apk"
            ARTIFACT_NAME="blbl-${CLEAN_VERSION}-release"
            PUBLISH_STABLE_R2="true"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            VERSION_NAME="${VERSION_NAME_BASE}.${GITHUB_RUN_NUMBER}"
            CLEAN_VERSION="${VERSION_NAME}"
            RELEASE_TAG="v${CLEAN_VERSION}"
            RELEASE_NAME="${RELEASE_TAG}"
            RELEASE_MODE="versioned"
            APK_FILE_NAME="blbl-${CLEAN_VERSION}-release.apk"
            ARTIFACT_NAME="blbl-${CLEAN_VERSION}-release"
            PUBLISH_STABLE_R2="true"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            SAFE_REF_NAME="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')"
            VERSION_NAME="${VERSION_NAME_BASE}.${GITHUB_RUN_NUMBER}-${SAFE_REF_NAME}-${SHORT_SHA}"
            RELEASE_TAG="snapshot-${SAFE_REF_NAME}"
            RELEASE_NAME="${GITHUB_REF_NAME} Snapshot"
            RELEASE_MODE="snapshot"
            APK_FILE_NAME="blbl-${VERSION_NAME}-release.apk"
            ARTIFACT_NAME="blbl-${SAFE_REF_NAME}-snapshot-release"
            PUBLISH_STABLE_R2="false"
          fi

          {
            echo "version_name=${VERSION_NAME}"
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=${RELEASE_NAME}"
            echo "release_mode=${RELEASE_MODE}"
            echo "apk_file_name=${APK_FILE_NAME}"
            echo "artifact_name=${ARTIFACT_NAME}"
            echo "publish_stable_r2=${PUBLISH_STABLE_R2}"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"
      - name: Validate release signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${RELEASE_KEYSTORE_BASE64:-}" ] || missing+=("RELEASE_KEYSTORE_BASE64")
          [ -n "${RELEASE_STORE_PASSWORD:-}" ] || missing+=("RELEASE_STORE_PASSWORD")
          [ -n "${RELEASE_KEY_ALIAS:-}" ] || missing+=("RELEASE_KEY_ALIAS")
          [ -n "${RELEASE_KEY_PASSWORD:-}" ] || missing+=("RELEASE_KEY_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required signing secrets: ${missing[*]}" >&2
            exit 1
          fi
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > keystore/release.keystore
      - name: Build release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionName=${{ steps.meta.outputs.version_name }} -PversionCode=${{ github.run_number }}
      - name: Upload release APK to R2 (optional)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || vars.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET || vars.R2_BUCKET }}
          R2_PREFIX: ${{ vars.R2_PREFIX || secrets.R2_PREFIX }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          APK_FILE_NAME: ${{ steps.meta.outputs.apk_file_name }}
          PUBLISH_STABLE_R2: ${{ steps.meta.outputs.publish_stable_r2 }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${R2_BUCKET:-}" ]; then
            echo "R2 variables not set, skipping upload."
            exit 0
          fi
          if [ "${PUBLISH_STABLE_R2}" != "true" ]; then
            echo "Snapshot build, skipping R2 stable release publish."
            exit 0
          fi
          if ! command -v aws >/dev/null 2>&1; then
            echo "aws cli not found, installing..."
            sudo apt-get update
            sudo apt-get install -y awscli
          fi

          export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          export AWS_REGION="auto"
          export AWS_EC2_METADATA_DISABLED=true
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          CLEAN_VERSION="${VERSION_NAME#v}"
          KEY_PREFIX="${R2_PREFIX:-blbl}"
          KEY_PREFIX="${KEY_PREFIX%/}"
          if [ -n "${KEY_PREFIX}" ]; then
            KEY_PREFIX="${KEY_PREFIX}/"
          fi

          APK_PATH="app/build/outputs/apk/release/${APK_FILE_NAME}"
          printf '%s' "${CLEAN_VERSION}" > version
          aws s3 cp "version" "s3://${R2_BUCKET}/${KEY_PREFIX}version" --endpoint-url "${ENDPOINT}" --content-type "text/plain" --cache-control "no-cache"
          aws s3 cp "${APK_PATH}" "s3://${R2_BUCKET}/${KEY_PREFIX}${APK_FILE_NAME}" --endpoint-url "${ENDPOINT}" --content-type "application/vnd.android.package-archive"
          aws s3 cp "${APK_PATH}" "s3://${R2_BUCKET}/${KEY_PREFIX}blbl-latest-release.apk" --endpoint-url "${ENDPOINT}" --content-type "application/vnd.android.package-archive" --cache-control "no-cache"
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: app/build/outputs/apk/release/${{ steps.meta.outputs.apk_file_name }}
      - name: Publish release APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          RELEASE_MODE: ${{ steps.meta.outputs.release_mode }}
          APK_FILE_NAME: ${{ steps.meta.outputs.apk_file_name }}
          CHANGELOG: ${{ github.event.inputs.changelog || '' }}
        run: |
          set -euo pipefail

          if [ "${RELEASE_MODE}" = "snapshot" ]; then
            gh release delete "$RELEASE_TAG" --yes >/dev/null 2>&1 || true
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" >/dev/null 2>&1 || true

            printf '%s\n\n%s\n\n%s\n' \
              "自动构建分支：${GITHUB_REF_NAME}" \
              "提交：${GITHUB_SHA}" \
              "运行记录：${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              > changelog.md

            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_NAME" \
              --notes-file changelog.md \
              --target "$GITHUB_SHA" \
              --prerelease
          else
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              if [ -n "${CHANGELOG:-}" ]; then
                printf '%s' "$CHANGELOG" > changelog.md
                gh release edit "$RELEASE_TAG" --notes-file changelog.md
              fi
            else
              if [ -n "${CHANGELOG:-}" ]; then
                printf '%s' "$CHANGELOG" > changelog.md
                gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file changelog.md --target "$GITHUB_SHA"
              else
                gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --generate-notes --target "$GITHUB_SHA"
              fi
            fi
          fi
          gh release upload "$RELEASE_TAG" "app/build/outputs/apk/release/${APK_FILE_NAME}" --clobber
      - name: Sync release assets to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_REPO: ${{ vars.GITEE_REPO || 'jadylc/asserts' }}
          GITEE_BRANCH: ${{ vars.GITEE_BRANCH || 'master' }}
          GITEE_UPDATES_DIR: ${{ vars.GITEE_UPDATES_DIR || 'updates' }}
          APK_FILE_NAME: ${{ steps.meta.outputs.apk_file_name }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          PUBLISH_STABLE_R2: ${{ steps.meta.outputs.publish_stable_r2 }}
        run: |
          set -euo pipefail

          if [ "${PUBLISH_STABLE_R2}" != "true" ]; then
            echo "Snapshot build, skipping Gitee sync."
            exit 0
          fi

          missing=()
          [ -n "${GITEE_TOKEN:-}" ] || missing+=("GITEE_TOKEN")
          [ -n "${GITEE_USERNAME:-}" ] || missing+=("GITEE_USERNAME")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing Gitee secrets, skipping sync: ${missing[*]}"
            exit 0
          fi

          APK_PATH="app/build/outputs/apk/release/${APK_FILE_NAME}"
          if [ ! -f "${APK_PATH}" ]; then
            echo "APK not found: ${APK_PATH}" >&2
            exit 1
          fi

          repo_dir="$(mktemp -d)"
          trap 'rm -rf "${repo_dir}"' EXIT

          git clone "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git" "${repo_dir}"
          cd "${repo_dir}"
          git checkout "${GITEE_BRANCH}"

          updates_dir="${repo_dir}/${GITEE_UPDATES_DIR}"
          mkdir -p "${updates_dir}"
          cp "${GITHUB_WORKSPACE}/${APK_PATH}" "${updates_dir}/${APK_FILE_NAME}"

          temp_json="${updates_dir}/version.json.tmp"
          final_json="${updates_dir}/version.json"
          printf '{\n  "version": "%s",\n  "apk_url": "https://gitee.com/%s/raw/%s/%s/%s"\n}\n' \
            "${VERSION_NAME}" \
            "${GITEE_REPO}" \
            "${GITEE_BRANCH}" \
            "${GITEE_UPDATES_DIR}" \
            "${APK_FILE_NAME}" \
            > "${temp_json}"
          mv "${temp_json}" "${final_json}"

          if [ -z "$(git status --porcelain -- "${GITEE_UPDATES_DIR}")" ]; then
            echo "No Gitee asset changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${GITEE_UPDATES_DIR}/${APK_FILE_NAME}" "${GITEE_UPDATES_DIR}/version.json"
          git commit -m "sync ${VERSION_NAME} release assets"
          git push origin "HEAD:${GITEE_BRANCH}"
