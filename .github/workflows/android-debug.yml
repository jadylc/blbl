name: Android Debug

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 0.1.1)"
        required: true
      changelog:
        description: "Release notes/changelog (optional; supports multiline)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute debug metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION_NAME="${{ inputs.version_name }}"
          CLEAN_VERSION="${VERSION_NAME#v}"
          APK_FILE_NAME="blbl-${CLEAN_VERSION}-debug.apk"
          ARTIFACT_NAME="blbl-${CLEAN_VERSION}-debug"
          RELEASE_TAG="v${CLEAN_VERSION}"
          RELEASE_NAME="${RELEASE_TAG}"
          {
            echo "version_name=${VERSION_NAME}"
            echo "clean_version=${CLEAN_VERSION}"
            echo "apk_file_name=${APK_FILE_NAME}"
            echo "artifact_name=${ARTIFACT_NAME}"
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=${RELEASE_NAME}"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build debug APK
        run: ./gradlew assembleDebug -PversionName=${{ steps.meta.outputs.clean_version }} -PversionCode=${{ github.run_number }}
      - name: Upload debug APK to R2 (optional)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || vars.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET || vars.R2_BUCKET }}
          R2_PREFIX: ${{ vars.R2_PREFIX || secrets.R2_PREFIX }}
          VERSION_NAME: ${{ steps.meta.outputs.clean_version }}
          APK_FILE_NAME: ${{ steps.meta.outputs.apk_file_name }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${R2_BUCKET:-}" ]; then
            echo "R2 variables not set, skipping upload."
            exit 0
          fi
          if ! command -v aws >/dev/null 2>&1; then
            echo "aws cli not found, installing..."
            sudo apt-get update
            sudo apt-get install -y awscli
          fi

          export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          export AWS_REGION="auto"
          export AWS_EC2_METADATA_DISABLED=true
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          KEY_PREFIX="${R2_PREFIX:-blbl}"
          KEY_PREFIX="${KEY_PREFIX%/}"
          if [ -n "${KEY_PREFIX}" ]; then
            KEY_PREFIX="${KEY_PREFIX}/"
          fi

          APK_PATH="app/build/outputs/apk/debug/${APK_FILE_NAME}"
          printf '%s' "${VERSION_NAME}" > version
          aws s3 cp "version" "s3://${R2_BUCKET}/${KEY_PREFIX}version" --endpoint-url "${ENDPOINT}" --content-type "text/plain" --cache-control "no-cache"
          aws s3 cp "${APK_PATH}" "s3://${R2_BUCKET}/${KEY_PREFIX}${APK_FILE_NAME}" --endpoint-url "${ENDPOINT}" --content-type "application/vnd.android.package-archive"
          aws s3 cp "${APK_PATH}" "s3://${R2_BUCKET}/${KEY_PREFIX}blbl-latest-debug.apk" --endpoint-url "${ENDPOINT}" --content-type "application/vnd.android.package-archive" --cache-control "no-cache"
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: app/build/outputs/apk/debug/${{ steps.meta.outputs.apk_file_name }}
      - name: Publish debug APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          CHANGELOG: ${{ inputs.changelog }}
          APK_FILE_NAME: ${{ steps.meta.outputs.apk_file_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            if [ -n "${CHANGELOG:-}" ]; then
              printf '%s' "$CHANGELOG" > changelog.md
              gh release edit "$RELEASE_TAG" --notes-file changelog.md
            fi
          else
            if [ -n "${CHANGELOG:-}" ]; then
              printf '%s' "$CHANGELOG" > changelog.md
              gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file changelog.md --target "$GITHUB_SHA"
            else
              gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --generate-notes --target "$GITHUB_SHA"
            fi
          fi
          gh release upload "$RELEASE_TAG" "app/build/outputs/apk/debug/${APK_FILE_NAME}" --clobber
